<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anh sẽ đợi bé 3 nămm</title>
    <style>
      :root {
        --pink: #ffcfd1;
        --accent: #ff6b6b;
        --muted: white;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial;
      }
      body {
        background: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: 900px;
        max-width: 95%;
        text-align: center;
        padding: 50px 20px;
      }
      h1 {
        color: var(--accent);
        font-weight: 700;
        margin: 0 0 8px;
        font-size: 28px;
      }
      p.lead {
        color: #c76f78;
        margin: 6px 0 30px;
        font-size: 13px;
      }

      /* media area */
      .media {
        width: 260px;
        height: 260px;
        margin: 0 auto 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* video & gif share the same box */
      video#defaultVideo,
      video#theVideo,
      img#theGif {
        width: 260px;
        height: 260px;
        object-fit: cover;
        border-radius: 12px;
        display: none; /* ẩn ban đầu (defaultVideo sẽ bật JS) */
      }

      .buttons {
        position: relative;
        height: 86px;
        width: 380px;
        margin: 0 auto;
      }
      .btn {
        appearance: none;
        border: 0;
        padding: 12px 22px;
        border-radius: 28px;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 0 6px 0 rgba(0, 0, 0, 0.08),
          inset 0 -2px rgba(0, 0, 0, 0.04);
        transition: transform 260ms ease, left 260ms ease, top 260ms ease;
      }
      .btn.solid {
        background: var(--accent);
        color: white;
        position: absolute;
        left: 12px;
        top: 20px;
      }
      .btn.outline {
        background: white;
        border: 2px solid var(--accent);
        color: var(--accent);
        position: absolute;
        right: 12px;
        top: 20px;
      }

      /* small responsive tweak */
      @media (max-width: 520px) {
        .media {
          width: 300px;
          height: 180px;
        }
        video#defaultVideo,
        video#theVideo,
        img#theGif {
          width: 300px;
          height: 180px;
        }
        .buttons {
          width: 320px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Em là duy nhất, mỗi em thoaiii</h1>
      <p class="lead">
        Khai thật đi anh, em không giận đâu, em chỉ muốn biết thôi =))
      </p>

      <div class="media" id="mediaArea">
        <!-- Video mặc định (hiện khi load trang) -->
        <!-- Đặt file default.mp4 vào cùng thư mục với index.html -->
        <video id="defaultVideo" playsinline autoplay loop muted>
          <source src="7074041515550.mp4" type="video/mp4" />
          Trình duyệt của bạn không hỗ trợ video mặc định.
        </video>

        <!-- Video chính (sẽ được show khi bấm "mỗi em") -->
        <video id="theVideo" playsinline loop muted>
          <source src="7073908111536.mp4" type="video/mp4" />
          Trình duyệt của bạn không hỗ trợ video chính.
        </video>

        <!-- GIF fallback (nếu bạn chỉ có gif hoặc video chính không phát được) -->
        <img id="theGif" src="7073908111536-unscreen.gif" alt="gif" />
      </div>

      <div class="buttons" id="area">
        <button id="many" class="btn solid">nhiều em</button>
        <button id="dodge" class="btn outline">mỗi em</button>
      </div>
    </div>

    <script>
      // Lấy phần tử
      const btnMany = document.getElementById("many"); // "nhiều em" - chạy trốn
      const btnDodge = document.getElementById("dodge"); // "mỗi em" - hiện media
      const defaultVideo = document.getElementById("defaultVideo"); // video mặc định
      const theVideo = document.getElementById("theVideo"); // video chính
      const theGif = document.getElementById("theGif"); // gif fallback
      const prompt = document.querySelector(".lead");

      // Hiển thị video mặc định khi trang load (nếu file tồn tại và play được).
      // Note: autoplay có thể bị chặn nếu không muted; defaultVideo đã muted.
      function showDefault() {
        // ẩn các media khác
        theVideo.style.display = "none";
        theGif.style.display = "none";

        // hiển thị default và cố gắng play
        defaultVideo.style.display = "block";
        // đảm bảo mute để autoplay được chấp nhận
        defaultVideo.muted = true;
        defaultVideo.play().catch((e) => {
          // nếu browser chặn autoplay, vẫn giữ hidden; người dùng cần tương tác
          console.warn("defaultVideo không autoplay được:", e);
        });
      }

      // Gọi showDefault ngay
      showDefault();

      // Hàm bật hiển thị media chính khi nhấn "mỗi em"
      function showMainMedia() {
        // ẩn prompt + nút
        prompt.style.display = "none";
        btnMany.style.display = "none";
        btnDodge.style.display = "none";

        // ẩn default
        defaultVideo.pause();
        defaultVideo.style.display = "none";

        // thử phát video chính
        theVideo.muted = true; // để autoplay được; sau đó có thể unmute nếu muốn
        theVideo
          .play()
          .then(() => {
            // video chính chạy tốt -> hiển thị video chính
            theVideo.style.display = "block";
            theGif.style.display = "none";
            // nếu bạn muốn bật tiếng tự động (không khuyến khích vì nhiều browser chặn), uncomment:
            // theVideo.muted = false;
          })
          .catch((err) => {
            // lỗi -> show gif fallback
            console.warn(
              "Video chính không phát được, fallback sang GIF:",
              err
            );
            theVideo.style.display = "none";
            theGif.style.display = "block";
          });
      }

      // Gán sự kiện: nhấn "mỗi em"
      btnDodge.addEventListener("click", (e) => {
        e.preventDefault();
        showMainMedia();
      });

      // Nút "nhiều em" chạy trốn khi di chuột / touch
      function moveRandom(elem) {
        const rect = elem.getBoundingClientRect();
        // giữ trong viewport
        const maxX = Math.max(0, window.innerWidth - rect.width - 8);
        const maxY = Math.max(0, window.innerHeight - rect.height - 8);
        const x = Math.floor(Math.random() * maxX);
        const y = Math.floor(Math.random() * maxY);
        elem.style.position = "fixed";
        elem.style.left = x + "px";
        elem.style.top = y + "px";
        elem.style.transition = "left 160ms ease, top 160ms ease";
      }

      btnMany.addEventListener("mouseover", () => moveRandom(btnMany));
      btnMany.addEventListener(
        "touchstart",
        (ev) => {
          ev.preventDefault();
          moveRandom(btnMany);
        },
        { passive: false }
      );

      // Tùy chọn: nếu bạn muốn khi người click "mỗi em" thì bật tiếng:
      // theVideo.muted = false; // gọi sau khi user đã tương tác (ví dụ trong .then của play)
    </script>
  </body>
</html>
